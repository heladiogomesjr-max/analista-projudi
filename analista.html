<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Analista PROJUDI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px;min-height:100vh}

/* ── HEADER ── */
header{background:#1a1a18;color:#f5f4f0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:10px}
.back{font-size:11px;color:#666;text-decoration:none;padding:4px 10px;border-radius:6px;border:1px solid #333;transition:all .15s}
.back:hover{color:#ccc;border-color:#666}
header h1{font-size:15px;font-weight:600;letter-spacing:.02em}
.header-right{display:flex;align-items:center;gap:10px}
.usuario-badge{font-size:11px;color:#888;padding:4px 10px;border-radius:6px;background:#222;border:1px solid #333}
#btn-logout{padding:5px 12px;border-radius:6px;border:1px solid #444;background:transparent;color:#aaa;font-size:11px;cursor:pointer;transition:all .15s}
#btn-logout:hover{background:#333;color:#fff}

/* ── LOGIN ── */
#tela-login{position:fixed;inset:0;background:#f5f4f0;display:flex;align-items:center;justify-content:center;z-index:999}
.login-box{background:#fff;border-radius:12px;border:1px solid #e8e7e3;padding:36px 32px;width:320px;display:flex;flex-direction:column;gap:16px}
.login-box h2{font-size:16px;font-weight:700}
.login-box p{font-size:12px;color:#999}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:600;color:#555}
.field input,.field select,.field textarea{padding:9px 12px;border-radius:7px;border:1.5px solid #e0dfd8;font-size:13px;font-family:inherit;background:#fafaf7;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#1a7a55}
.btn-primary{padding:10px;border-radius:7px;border:none;background:#1a1a18;color:#f5f4f0;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.btn-primary:hover{background:#333}
.btn-primary:disabled{opacity:.5;cursor:default}
@keyframes _spin{to{transform:rotate(360deg)}}
.btn-primary.loading{cursor:wait;opacity:.9;background:#1a1a18}
.btn-primary.loading::before{content:'';display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:_spin .6s linear infinite;margin-right:7px;vertical-align:middle}
.err-msg{font-size:12px;color:#c0392b;background:#fdf0ee;padding:8px 12px;border-radius:6px;display:none}

/* ── WRAP ── */
.wrap{padding:16px 24px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}

/* ── FORM PANEL ── */
.form-panel{background:#fff;border-radius:10px;border:1px solid #e8e7e3;padding:18px}
.form-panel h2{font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #f0efe9}
.tabs{display:flex;gap:0;margin-bottom:16px;border-radius:7px;overflow:hidden;border:1.5px solid #e0dfd8}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;color:#888;cursor:pointer;background:#fafaf7;transition:all .15s}
.tab.active{background:#1a1a18;color:#f5f4f0}
.tab-content{display:none}
.tab-content.active{display:flex;flex-direction:column;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field textarea{min-height:90px;resize:vertical;font-family:monospace;font-size:12px}
.btn-run{padding:11px;border-radius:7px;border:none;background:#1a7a55;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px}
.btn-run:hover{background:#15603f}
.btn-run:disabled{opacity:.5;cursor:default}
.form-err{font-size:12px;color:#c0392b;background:#fdf0ee;padding:8px 12px;border-radius:6px;display:none;margin-top:4px}
.orgao-chip{padding:3px 10px;border-radius:14px;border:1.5px solid #e0dfd8;background:#fff;cursor:pointer;font-size:11px;font-weight:500;color:#555;transition:all .15s;user-select:none}
.orgao-chip.sel{background:#1a1a18;color:#f5f4f0;border-color:#1a1a18}
.select-row{display:flex;gap:6px;align-items:center}
.select-row select{flex:1}
.btn-add{width:30px;height:30px;border-radius:7px;border:1.5px solid #e0dfd8;background:#fafaf7;color:#555;font-size:18px;line-height:1;cursor:pointer;flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.btn-add:hover{background:#1a1a18;color:#fff;border-color:#1a1a18}

/* ── POPUP CADASTRO ── */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:2000;display:flex;align-items:center;justify-content:center}
.popup-box{background:#fff;border-radius:12px;border:1px solid #e8e7e3;padding:28px 26px;width:360px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.popup-box h3{font-size:14px;font-weight:700;color:#1a1a18}
.popup-box p{font-size:11px;color:#999;margin-top:-8px}
.popup-btns{display:flex;gap:8px;margin-top:4px}
.btn-cancel{flex:1;padding:9px;border-radius:7px;border:1.5px solid #e0dfd8;background:#fafaf7;color:#555;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:#eee}
.btn-save{flex:2;padding:9px;border-radius:7px;border:none;background:#1a1a18;color:#f5f4f0;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#333}
.btn-save:disabled{opacity:.5;cursor:default}

/* ── JOBS PANEL ── */
.jobs-panel{display:flex;flex-direction:column;gap:12px}
.jobs-header{display:flex;align-items:center;justify-content:space-between}
.jobs-header h2{font-size:11px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.07em}
.jobs-header span{font-size:11px;color:#bbb}
.job-card{background:#fff;border-radius:10px;border:1px solid #e8e7e3;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.job-card.running{border-left:3px solid #e6a817}
.job-card.done{border-left:3px solid #1a7a55}
.job-card.error,.job-card.cancelled{border-left:3px solid #c0392b}
.job-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.job-id{font-family:monospace;font-size:11px;color:#bbb}
.job-adv{font-size:11px;font-weight:600;color:#555;background:#f5f4f0;padding:2px 8px;border-radius:10px}
.job-status-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.st-running{background:#fff8e0;color:#9a6c00}
.st-done{background:#e8f7f0;color:#1a7a55}
.st-error,.st-cancelled{background:#fdf0ee;color:#c0392b}
.job-sub{font-size:12px;color:#666}
.prog-track{height:6px;background:#f0efe9;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:#1a7a55;border-radius:3px;transition:width .5s}
.prog-fill.running{background:#e6a817}
.prog-fill.error,.prog-fill.cancelled{background:#c0392b}
.job-logs{background:#1a1a18;border-radius:6px;padding:8px 10px;min-height:120px;max-height:420px;overflow-y:auto;font-family:monospace;font-size:11px;color:#aaa;line-height:1.5;cursor:pointer;transition:box-shadow .15s}
.job-logs:hover{box-shadow:0 0 0 1.5px #444}

/* ── LOG POPUP ── */
.log-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1500;display:flex;align-items:center;justify-content:center}
.log-popup-box{background:#1a1a18;border-radius:10px;width:min(900px,94vw);height:82vh;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.6);border:1px solid #333}
.log-popup-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #2a2a2a;flex-shrink:0}
.log-popup-title{color:#ccc;font-size:12px;font-weight:600;font-family:monospace}
.log-popup-close{background:none;border:1px solid #444;color:#888;font-size:12px;cursor:pointer;padding:3px 10px;border-radius:5px}
.log-popup-close:hover{color:#fff;background:#333;border-color:#555}
.log-popup-body{flex:1;overflow-y:auto;padding:12px 14px;font-family:monospace;font-size:12px;color:#aaa;line-height:1.6;min-height:0}
.job-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-sm{padding:5px 12px;border-radius:6px;border:1.5px solid;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-pause{border-color:#e6a817;color:#9a6c00;background:transparent}
.btn-pause:hover{background:#e6a817;color:#fff}
.btn-cancel{border-color:#f5c6bc;color:#c0392b;background:transparent}
.btn-cancel:hover{background:#c0392b;color:#fff}
.no-jobs{text-align:center;padding:32px;color:#bbb;font-size:13px;background:#fff;border-radius:10px;border:1px solid #e8e7e3}
.btn-limpar{font-size:11px;color:#bbb;background:none;border:1px solid transparent;cursor:pointer;padding:3px 8px;border-radius:5px;transition:all .15s}
.btn-limpar:hover{background:#f0efe9;color:#555;border-color:#e0dfd8}

@media(max-width:860px){.wrap{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="login-box">
    <div>
      <h2>Analista PROJUDI</h2>
      <p style="margin-top:4px">Entre para iniciar análises</p>
    </div>
    <div class="field">
      <label>Usuário</label>
      <input type="text" id="login-usuario" placeholder="admin" autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••" autocomplete="current-password">
    </div>
    <div class="err-msg" id="login-err"></div>
    <button class="btn-primary" id="btn-login" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<header>
  <div class="header-left">
    <a class="back" href="index.html">← Voltar</a>
    <h1>Analista PROJUDI</h1>
  </div>
  <div class="header-right">
    <span class="usuario-badge" id="usuario-badge" style="display:none"></span>
    <button id="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<div class="wrap" id="main-wrap" style="display:none">

  <!-- FORMULÁRIO -->
  <div class="form-panel">
    <h2>Nova análise</h2>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('djen')">DJEN</div>
      <div class="tab" onclick="switchTab('xlsx')">Processos</div>
      <div class="tab" onclick="switchTab('reanalise')">Re-análise</div>
    </div>

    <!-- TAB DJEN -->
    <div class="tab-content active" id="tab-djen">
      <div class="field">
        <label>Usuário PROJUDI</label>
        <div class="select-row">
          <select id="djen-usuario" onchange="preencherSenha('djen')"></select>
          <button class="btn-add" onclick="abrirCadastro()" title="Cadastrar novo advogado">+</button>
        </div>
      </div>
      <div class="field">
        <label>Nome do advogado (busca no DJEN)</label>
        <input type="text" id="djen-nome" placeholder="Ex: LUIS ALBERT DOS SANTOS">
      </div>
      <div class="row2">
        <div class="field">
          <label>Data inicial</label>
          <input type="date" id="djen-ini">
        </div>
        <div class="field">
          <label>Data final</label>
          <input type="date" id="djen-fim">
        </div>
      </div>
      <div class="field">
        <label>Órgãos julgadores (nenhum = todos)</label>
        <div id="orgaos-list" style="display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#fafaf7;border-radius:7px;border:1.5px solid #e0dfd8"></div>
      </div>
      <div class="field">
        <label>Filtro por palavra-chave (opcional)</label>
        <input type="text" id="djen-filtro" placeholder="Ex: provido">
      </div>
      <div class="field" style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="djen-filtro-tipo" style="width:16px;height:16px;cursor:pointer">
        <label for="djen-filtro-tipo" style="margin:0;cursor:pointer;font-size:13px">Apenas <strong>acórdãos</strong> <span style="color:#9ca3af;font-weight:400">(JUNTADA, COM/SEM JULGAMENTO DE MÉRITO…)</span></label>
      </div>
      <div class="err-msg" id="djen-err"></div>
      <button class="btn-run" onclick="iniciarDjen()">▶ Iniciar análise DJEN</button>
    </div>

    <!-- TAB XLSX / PROCESSOS -->
    <div class="tab-content" id="tab-xlsx">
      <div class="field">
        <label>Usuário PROJUDI</label>
        <div class="select-row">
          <select id="xlsx-usuario" onchange="preencherSenha('xlsx')"></select>
          <button class="btn-add" onclick="abrirCadastro()" title="Cadastrar novo advogado">+</button>
        </div>
      </div>
      <div class="field">
        <label>Números dos processos (um por linha)</label>
        <textarea id="xlsx-numeros" placeholder="0000001-00.0000.0.00.0000&#10;0000002-00.0000.0.00.0000"></textarea>
      </div>
      <div class="err-msg" id="xlsx-err"></div>
      <button class="btn-run" onclick="iniciarXlsx()">▶ Iniciar análise</button>
    </div>
  </div>

    <!-- TAB RE-ANÁLISE -->
    <div class="tab-content" id="tab-reanalise">
      <div class="field">
        <label>Usuário PROJUDI</label>
        <div class="select-row">
          <select id="reanalise-usuario" onchange="preencherSenha('reanalise')"></select>
        </div>
      </div>
      <div class="field">
        <label>Filtrar por MATÉRIA</label>
        <div style="display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#fafaf7;border-radius:7px;border:1.5px solid #e0dfd8" id="reanalise-materias">
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="OUTRO"> OUTRO</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="COBRANCA_IND"> COBRANCA_IND</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="CARTAO_CREDITO"> CARTAO_CREDITO</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="EMPRESTIMO_CONSIGNADO"> EMPRESTIMO_CONSIGNADO</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="SEGURO_PRESTAMISTA"> SEGURO_PRESTAMISTA</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="CONTA_CORRENTE"> CONTA_CORRENTE</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="FINANCIAMENTO"> FINANCIAMENTO</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="SAQUE_TERMINAL"> SAQUE_TERMINAL</label>
        </div>
      </div>
      <div class="field">
        <label>Filtrar por STATUS</label>
        <div style="display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:#fafaf7;border-radius:7px;border:1.5px solid #e0dfd8" id="reanalise-status">
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="FAVORÁVEL"> FAVORÁVEL</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="DESFAVORÁVEL"> DESFAVORÁVEL</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="EXTINTO SEM MÉRITO"> EXTINTO SEM MÉRITO</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="SENTENÇA ANULADA"> SENTENÇA ANULADA</label>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer"><input type="checkbox" value="SEM PARECER CONCLUSIVO"> SEM PARECER CONCLUSIVO</label>
        </div>
      </div>
      <div class="field">
        <label>Ou processos específicos (um por linha)</label>
        <textarea id="reanalise-processos" placeholder="Deixe em branco para usar os filtros acima"></textarea>
      </div>
      <div class="err-msg" id="reanalise-err"></div>
      <button class="btn-run" onclick="iniciarReanalise()">🔄 Iniciar re-análise</button>
    </div>

  <!-- JOBS -->
  <div class="jobs-panel">
    <div class="jobs-header">
      <h2>Execuções em andamento</h2>
      <div style="display:flex;align-items:center;gap:10px">
        <span id="jobs-info">Atualizando…</span>
        <button class="btn-limpar" onclick="limparConcluidas()">Limpar concluídas</button>
      </div>
    </div>
    <div id="jobs-lista"></div>
  </div>

</div>

<script>
// ╔══════════════════════════════════════════════════╗
// ║  CONFIGURAÇÃO                                   ║
// ╚══════════════════════════════════════════════════╝
const SERVER = ''; // Vercel proxy — ver vercel.json rewrites
// ════════════════════════════════════════════════════


const ORGAOS_TJAM = [
  { id: 69475, label: '1ª Turma Recursal' },
  { id: 69559, label: '2ª Turma Recursal' },
  { id: 69642, label: '3ª Turma Recursal' },
  { id: 69560, label: '4ª Turma - Fazenda' },
  { id: 69474, label: '1ª Câmara Cível' },
  { id: 69470, label: '2ª Câmara Cível' },
  { id: 69466, label: '3ª Câmara Cível' },
  { id: 69476, label: 'Câmaras Reunidas' },
];

let TOKEN    = localStorage.getItem('analista_token') || '';
let _pollInterval = null;
function _iniciarPolling() {
  if (_pollInterval) return;          // já está rodando
  atualizarJobs();
  _pollInterval = setInterval(atualizarJobs, 8000);
}
let USUARIOS = [];
let orgaosSelecionados = new Set();
const ADV_LABELS = { luis_albert: 'LUIS ALBERT', nicolas_gomes: 'NICOLAS GOMES' };

// ── AUTH ────────────────────────────────────────────
async function fazerLogin() {
  const usuario = document.getElementById('login-usuario').value.trim();
  const senha   = document.getElementById('login-senha').value.trim();
  const btn     = document.getElementById('btn-login');
  const err     = document.getElementById('login-err');
  if (!usuario || !senha) { mostrarErr(err, 'Preencha usuário e senha.'); return; }
  btn.disabled = true; btn.classList.add('loading'); btn.textContent = 'Verificando…'; err.style.display = 'none';
  try {
    const res  = await api('/api/login', 'POST', { usuario, senha }, false);
    const json = await res.json();
    if (json.ok) {
      TOKEN = json.token;
      localStorage.setItem('analista_token', TOKEN);
      localStorage.setItem('analista_usuario', usuario);
      btn.textContent = 'Carregando…';
      await carregarUsuarios();
      mostrarApp(usuario);
      _iniciarPolling();
    } else {
      mostrarErr(err, json.error || 'Erro ao autenticar.');
    }
  } catch(e) { mostrarErr(err, 'Servidor inacessível: ' + e.message); }
  finally { btn.disabled = false; btn.classList.remove('loading'); btn.textContent = 'Entrar'; }
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('analista_token');
  location.reload();
}

function _sessaoExpirada() {
  if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
  TOKEN = '';
  localStorage.removeItem('analista_token');
  document.getElementById('main-wrap').style.display  = 'none';
  document.getElementById('btn-logout').style.display = 'none';
  document.getElementById('usuario-badge').style.display = 'none';
  if (_logPopupJobId) fecharLogPopup();
  const tela = document.getElementById('tela-login');
  tela.style.display = 'flex';
  const err = document.getElementById('login-err');
  mostrarErr(err, '⚠️ Sessão expirada. Faça login novamente. O job em andamento continua no servidor.');
}

function mostrarApp(usuario) {
  document.getElementById('tela-login').style.display  = 'none';
  document.getElementById('main-wrap').style.display   = 'grid';
  document.getElementById('btn-logout').style.display  = '';
  const badge = document.getElementById('usuario-badge');
  badge.textContent = usuario;
  badge.style.display = '';
}

// ── ÓRGÃOS ─────────────────────────────────────────
function buildOrgaos() {
  const el = document.getElementById('orgaos-list');
  el.innerHTML = ORGAOS_TJAM.map(o =>
    `<div class="orgao-chip" data-id="${o.id}" onclick="toggleOrgao(this,${o.id})">${o.label}</div>`
  ).join('');
}
function toggleOrgao(el, id) {
  if (orgaosSelecionados.has(id)) { orgaosSelecionados.delete(id); el.classList.remove('sel'); }
  else { orgaosSelecionados.add(id); el.classList.add('sel'); }
}

// ── USUÁRIOS ────────────────────────────────────────
async function carregarUsuarios() {
  try {
    const res  = await api('/api/usuarios');
    const json = await res.json();
    USUARIOS = json || [];
    ['djen', 'xlsx', 'reanalise'].forEach(t => {
      const sel = document.getElementById(t + '-usuario');
      if (sel) sel.innerHTML = USUARIOS.map(u =>
        `<option value="${u.cpf}" data-senha="${u.senha}" data-nome="${u.nome || u.label}">${u.label}</option>`
      ).join('');
    });
    // Preenche nome do advogado DJEN com o primeiro usuário da lista
    preencherSenha('djen');
  } catch(e) { console.warn('Usuários:', e); }
}

function preencherSenha(tab) {
  if (tab === 'djen') {
    const sel  = document.getElementById('djen-usuario');
    const nome = sel.options[sel.selectedIndex]?.dataset?.nome || '';
    if (nome) document.getElementById('djen-nome').value = nome;
  }
}

// ── TABS ────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['djen','xlsx','reanalise'][i] === tab));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ── INICIAR ANÁLISES ────────────────────────────────
async function iniciarDjen() {
  const err    = document.getElementById('djen-err');
  const sel    = document.getElementById('djen-usuario');
  const cpf    = sel.value;
  const senha  = sel.options[sel.selectedIndex]?.dataset?.senha || '';
  const nome   = document.getElementById('djen-nome').value.trim();
  const ini    = document.getElementById('djen-ini').value;
  const fim    = document.getElementById('djen-fim').value;
  const filtro     = document.getElementById('djen-filtro').value.trim();
  const filtroTipo = document.getElementById('djen-filtro-tipo').checked;
  const batch  = 0;
  err.style.display = 'none';
  if (!nome) { mostrarErr(err, 'Informe o nome do advogado.'); return; }
  if (!ini || !fim) { mostrarErr(err, 'Informe as datas.'); return; }

  const btn = document.querySelector('#tab-djen .btn-run');
  btn.disabled = true; btn.textContent = '⏳ Iniciando…';
  try {
    const turmas = orgaosSelecionados.size > 0 ? [...orgaosSelecionados].join(',') : '0';
    const res  = await api('/api/iniciar_djen', 'POST', { cpf, senha, nome_adv: nome, data_ini: ini, data_fim: fim, filtro_texto: filtro, filtro_tipo_doc: filtroTipo, batch, turma: turmas });
    const json = await res.json();
    if (json.ok) { btn.textContent = '✅ Iniciado!'; setTimeout(() => { btn.disabled=false; btn.textContent='▶ Iniciar análise DJEN'; }, 2000); }
    else { mostrarErr(err, json.error); btn.disabled=false; btn.textContent='▶ Iniciar análise DJEN'; }
  } catch(e) { mostrarErr(err, 'Erro: ' + e.message); btn.disabled=false; btn.textContent='▶ Iniciar análise DJEN'; }
}

// ── JOBS ────────────────────────────────────────────
async function atualizarJobs() {
  try {
    const res = await api('/api/jobs');
    if (res.status === 401) { _sessaoExpirada(); return; }
    const json = await res.json();
    if (!json.ok) return;
    renderJobs(json.jobs || []);
    const rodando = (json.jobs || []).filter(j => j.status === 'running').length;
    document.getElementById('jobs-info').textContent =
      rodando ? `${rodando} rodando · atualiza a cada 4s` : 'Nenhuma execução ativa';
  } catch(e) { document.getElementById('jobs-info').textContent = 'Erro ao buscar jobs'; }
}

let _lastJobs      = [];
let _logPopupJobId = null;
let _hiddenJobs    = new Set(JSON.parse(localStorage.getItem('analista_hidden_jobs') || '[]'));

function limparConcluidas() {
  _lastJobs.filter(j => j.status !== 'running').forEach(j => _hiddenJobs.add(j.job_id));
  localStorage.setItem('analista_hidden_jobs', JSON.stringify([..._hiddenJobs]));
  renderJobs(_lastJobs);
}

function copiarLog() {
  const body = document.getElementById('log-popup-body');
  const text = Array.from(body.querySelectorAll('div')).map(d => d.textContent).join('\n');
  const btn  = document.getElementById('btn-copiar-log');
  const copy = t => { btn.textContent = t; setTimeout(() => btn.textContent = '📋 Copiar tudo', 2000); };
  navigator.clipboard.writeText(text).then(() => copy('✓ Copiado!')).catch(() => {
    try { const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);copy('✓ Copiado!'); }
    catch { copy('⚠ Falhou'); }
  });
}

function renderJobs(lista) {
  _lastJobs = lista;
  const el = document.getElementById('jobs-lista');

  // Captura posição de scroll antes de reconstruir o DOM
  const scrollAtBottom = {};
  el.querySelectorAll('.job-logs[data-jid]').forEach(div => {
    scrollAtBottom[div.dataset.jid] = div.scrollTop + div.clientHeight >= div.scrollHeight - 20;
  });

  const visiveis = lista.filter(j => j.status === 'running' || !_hiddenJobs.has(j.job_id));
  if (!visiveis.length) {
    el.innerHTML = '<div class="no-jobs">Nenhuma execução registrada.<br><small>Inicie uma análise no formulário ao lado.</small></div>';
    return;
  }
  el.innerHTML = visiveis.map(j => {
    const cls   = j.status === 'running' ? 'running' : j.status === 'done' ? 'done' : j.status === 'cancelled' ? 'cancelled' : 'error';
    const stLbl = { running:'Rodando', done:'Concluído', error:'Erro', cancelled:'Cancelado' }[j.status] || j.status;
    const advLbl = ADV_LABELS[j.advogado_key] || j.advogado_key || '—';
    const logs  = (j.logs_tail || []).map(l => `<div>${sanitize(l)}</div>`).join('');
    const hora  = j.criado_em ? new Date(j.criado_em * 1000).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const acoes = j.status === 'running' ? `
      <button class="btn-sm btn-pause" onclick="pausar('${j.job_id}')">${j.pausado ? '▶ Retomar' : '⏸ Pausar'}</button>
      <button class="btn-sm btn-cancel" onclick="cancelar('${j.job_id}')">✕ Cancelar</button>` : '';
    return `<div class="job-card ${cls}">
      <div class="job-top">
        <span class="job-id">${j.job_id} · ${hora}</span>
        <span class="job-adv">${advLbl}</span>
        <span class="job-status-badge st-${cls}">${stLbl}</span>
      </div>
      <div class="job-sub">${sanitize(j.subtitulo || '')}</div>
      <div class="prog-track"><div class="prog-fill ${cls}" style="width:${j.pct||0}%"></div></div>
      ${logs ? `<div class="job-logs" data-jid="${j.job_id}" onclick="abrirLogPopup('${j.job_id}')" title="Clique para expandir">${logs}</div>` : ''}
      ${j.error ? `<div style="font-size:11px;color:#c0392b">${sanitize(j.error)}</div>` : ''}
      ${acoes ? `<div class="job-actions">${acoes}</div>` : ''}
    </div>`;
  }).join('');

  // Restaura scroll: auto-scroll ao fim só se o usuário já estava no fim (ou primeira renderização)
  el.querySelectorAll('.job-logs[data-jid]').forEach(div => {
    const jid = div.dataset.jid;
    if (!(jid in scrollAtBottom) || scrollAtBottom[jid]) {
      div.scrollTop = div.scrollHeight;
    }
  });

  // Atualiza popup se estiver aberto
  if (_logPopupJobId) {
    const job = lista.find(j => j.job_id === _logPopupJobId);
    if (job) _atualizarPopupLogs(job);
  }
}

function abrirLogPopup(job_id) {
  _logPopupJobId = job_id;
  document.getElementById('log-popup').style.display = 'flex';
  const job = _lastJobs.find(j => j.job_id === job_id);
  if (job) {
    _atualizarPopupLogs(job);
    // Na abertura, força scroll ao fim
    const body = document.getElementById('log-popup-body');
    body.scrollTop = body.scrollHeight;
  }
}

function fecharLogPopup() {
  _logPopupJobId = null;
  document.getElementById('log-popup').style.display = 'none';
}

function _atualizarPopupLogs(job) {
  const body  = document.getElementById('log-popup-body');
  const title = document.getElementById('log-popup-title');
  const stLbl = { running:'Rodando', done:'Concluído', error:'Erro', cancelled:'Cancelado' }[job.status] || job.status;
  title.textContent = `${job.job_id} — ${stLbl}`;
  const logs = (job.logs_tail || []).map(l => `<div>${sanitize(l)}</div>`).join('');
  // Só rola ao fim se o usuário já estava no fim
  const atBottom = body.scrollTop + body.clientHeight >= body.scrollHeight - 20;
  body.innerHTML = logs;
  if (atBottom) body.scrollTop = body.scrollHeight;
}

async function pausar(job_id) {
  await api(`/api/pausar/${job_id}`, 'POST');
  atualizarJobs();
}

async function cancelar(job_id) {
  if (!confirm('Cancelar esta execução?')) return;
  await api(`/api/cancelar/${job_id}`, 'POST');
  atualizarJobs();
}

// ── UTILITÁRIOS ────────────────────────────────────
function api(path, method='GET', body=null, withToken=true) {
  const headers = { 'Content-Type': 'application/json' };
  if (withToken && TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  return fetch(SERVER + path, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
  });
}

function mostrarErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
function sanitize(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ────────────────────────────────────────────
(async function init() {
  // datas padrão: últimos 30 dias
  const hoje = new Date(), ini = new Date(hoje);
  ini.setDate(ini.getDate() - 30);
  document.getElementById('djen-fim').value = hoje.toISOString().slice(0,10);
  document.getElementById('djen-ini').value = ini.toISOString().slice(0,10);

  buildOrgaos();
  if (TOKEN) {
    try {
      const res = await api('/api/jobs');
      if (res.ok) {
        await carregarUsuarios();
        mostrarApp(localStorage.getItem('analista_usuario') || 'admin');
        _iniciarPolling();
        return;
      }
    } catch(e) {}
    TOKEN = ''; localStorage.removeItem('analista_token');
  }
  // Tecla Enter no login
  document.getElementById('login-senha').addEventListener('keydown', e => { if (e.key==='Enter') fazerLogin(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && _logPopupJobId) fecharLogPopup(); });
})();

// ── CADASTRO DE ADVOGADO ─────────────────────────────
function abrirCadastro() {
  document.getElementById('popup-cadastro').style.display = 'flex';
  document.getElementById('cad-cpf').focus();
}
function fecharCadastro() {
  document.getElementById('popup-cadastro').style.display = 'none';
  ['cad-cpf','cad-senha','cad-label','cad-nome','cad-sheet'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('cad-err').style.display = 'none';
}
async function salvarAdvogado() {
  const cpf    = document.getElementById('cad-cpf').value.trim();
  const senha  = document.getElementById('cad-senha').value.trim();
  const label  = document.getElementById('cad-label').value.trim();
  const nome   = document.getElementById('cad-nome').value.trim();
  const sheet  = document.getElementById('cad-sheet').value.trim();
  const err    = document.getElementById('cad-err');
  const btn    = document.getElementById('cad-btn-salvar');

  err.style.display = 'none';
  if (!cpf)   { err.textContent = 'CPF / Login é obrigatório.';       err.style.display='block'; return; }
  if (!senha) { err.textContent = 'Senha é obrigatória.';             err.style.display='block'; return; }
  if (!label) { err.textContent = 'Nome curto é obrigatório.';        err.style.display='block'; return; }
  if (!nome)  { err.textContent = 'Nome completo é obrigatório.';     err.style.display='block'; return; }

  btn.disabled = true; btn.textContent = 'Salvando…';
  try {
    const res  = await api('/api/usuarios', 'POST', { cpf, senha, label, nome, sheet_id: sheet });
    const json = await res.json();
    if (json.ok) {
      await carregarUsuarios();
      fecharCadastro();
    } else {
      err.textContent = json.error || 'Erro ao salvar.';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Erro de conexão.';
    err.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Salvar';
  }
}
</script>
