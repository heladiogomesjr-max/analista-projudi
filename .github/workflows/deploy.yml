name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-vm:
    name: VM Oracle Cloud
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 129.146.135.39
          username: opc
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/analista-projudi
            sudo git pull origin main
            sudo systemctl restart analista-projudi

  deploy-apps-script:
    name: Google Apps Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar clasp
        run: |
          npm install -g @google/clasp
          echo "Versão instalada: $(clasp --version)"
      - name: Autenticar clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          python3 -c "import json,os; json.dump(json.loads(os.environ['CLASPRC_JSON']), open(os.path.expanduser('~/.clasprc.json'), 'w'))"
          echo "Auth ok"
      - name: Push código
        working-directory: apps_script
        run: clasp push --force
      - name: Criar nova versão
        working-directory: apps_script
        run: |
          clasp deploy \
            --deploymentId "AKfycbyS6-Zz8aNk4OOeLPfiwI8NdUv7yfvlm-hCoxNQ5-t2cHS6a35ICZB-C_uAJxePxYjukQ" \
            --description "deploy auto $(date +'%Y-%m-%d %H:%M')"
