<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Distribuições 2º Grau — PROJUDI</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;display:flex;flex-direction:column}
header{background:#0a0d10;color:#e6edf3;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;border-bottom:1px solid #21262d}
header .title h1{font-size:15px;font-weight:600;letter-spacing:.03em}
header .title p{font-size:11px;color:#8b949e;margin-top:2px}
header .back{font-size:12px;color:#8b949e;text-decoration:none;white-space:nowrap}
header .back:hover{color:#e6edf3}
.main{flex:1;padding:28px 24px;max-width:1280px;margin:0 auto;width:100%}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:60vh}
.login-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:36px 32px;width:100%;max-width:360px}
.login-box h2{font-size:15px;font-weight:700;margin-bottom:20px;color:#e6edf3}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:600;color:#8b949e;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;padding:9px 12px;border:1px solid #30363d;border-radius:8px;font-size:13px;outline:none;background:#0d1117;color:#e6edf3}
.field input:focus{border-color:#388bfd}
.btn-login{width:100%;background:#238636;color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:hover{background:#2ea043}
.login-err{font-size:12px;color:#f85149;margin-top:10px;text-align:center}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.toolbar select,.toolbar input[type=text]{padding:8px 12px;border:1px solid #30363d;border-radius:8px;font-size:13px;background:#161b22;color:#e6edf3;outline:none}
.toolbar select:focus,.toolbar input:focus{border-color:#388bfd}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.btn-primary{background:#238636;color:#fff}
.btn-primary:hover{background:#2ea043}
.btn-primary:disabled{background:#21262d;color:#8b949e;cursor:not-allowed}
.lbl-date{font-size:11px;color:#8b949e;font-weight:600}
input[type=date]{padding:7px 10px;border:1px solid #30363d;border-radius:8px;font-size:13px;background:#161b22;color:#e6edf3;outline:none}
input[type=date]:focus{border-color:#388bfd}
.last-update{font-size:11px;color:#8b949e;margin-left:auto}

/* Progress */
.progress-bar{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin-bottom:20px}
.progress-fill{height:100%;background:#388bfd;border-radius:2px;transition:width .3s}
.status-msg{font-size:12px;color:#8b949e;margin-bottom:16px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
@media(max-width:700px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px 20px}
.stat-card .val{font-size:24px;font-weight:700;color:#e6edf3}
.stat-card .val.loading{color:#30363d;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.stat-card .lbl{font-size:11px;color:#8b949e;margin-top:3px}
.stat-card.pendente .val{color:#e3b341}
.stat-card.pautado .val{color:#79c0ff}

/* Table */
.table-wrap{background:#161b22;border:1px solid #30363d;border-radius:12px;overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.table-wrap th{background:#21262d;color:#8b949e;padding:10px 12px;text-align:left;font-size:11px;font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.table-wrap td{padding:9px 12px;border-bottom:1px solid #21262d;vertical-align:middle}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap tr:hover td{background:#1c2128}
.badge-novo{display:inline-block;background:#0f2d1e;color:#56d364;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px}
.proc-link{font-family:monospace;font-size:11px;color:#58a6ff;cursor:pointer;text-decoration:none}
.proc-link:hover{text-decoration:underline}
.empty{text-align:center;color:#8b949e;padding:48px 24px;font-size:13px}
.turma-badge{display:inline-block;background:#0d2044;color:#79c0ff;font-size:10px;padding:2px 8px;border-radius:12px;white-space:nowrap}
.status-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap}
.status-pendente{background:#2d2208;color:#e3b341}
.status-pautado{background:#0d2044;color:#79c0ff}
.status-julgado{background:#0f2d1e;color:#56d364}
</style>
</head>
<body>
<header>
  <div class="title">
    <h1>DISTRIBUIÇÕES 2º GRAU — PROJUDI</h1>
    <p>Processos recursais ativos • Atualização automática às 00:05</p>
  </div>
  <a class="back" href="/">← Dashboard</a>
</header>

<div class="main" id="app">
  <!-- Login -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h2>Acesso Restrito</h2>
      <div class="field"><label>Usuário</label><input id="usuario" type="text" autocomplete="username"></div>
      <div class="field"><label>Senha</label><input id="senha" type="password" autocomplete="current-password"></div>
      <button class="btn-login" onclick="fazerLogin()">Entrar</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div id="conteudo" style="display:none">
    <div class="toolbar">
      <select id="selAdv" onchange="trocarAdvogado()"></select>
      <select id="filtroTurma" onchange="aplicarFiltros()">
        <option value="">Todas as Turmas/Câmaras</option>
      </select>
      <select id="filtroStatus" onchange="aplicarFiltros()">
        <option value="">Todos os Status</option>
        <option value="Pendente">Pendente</option>
        <option value="Pautado">Pautado</option>
      </select>
      <input type="text" id="filtroBusca" placeholder="Buscar processo ou relator..." oninput="aplicarFiltros()" style="width:200px">
      <span class="lbl-date">DE</span>
      <input type="date" id="dataIni">
      <span class="lbl-date">ATÉ</span>
      <input type="date" id="dataFim">
      <button class="btn btn-primary" id="btnAtualizar" onclick="iniciarAtualizacao()">⟳ Atualizar agora</button>
      <span class="last-update" id="lastUpdate"></span>
    </div>

    <div id="progressWrap" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="status-msg" id="statusMsg">Aguardando...</div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Nº DO PROCESSO</th>
            <th>DISTRIBUIÇÃO</th>
            <th>TURMA/CÂMARA</th>
            <th>RELATOR</th>
            <th>CLASSE</th>
            <th>STATUS</th>
            <th>CAPTURA</th>
          </tr>
        </thead>
        <tbody id="tabela"></tbody>
      </table>
      <div class="empty" id="empty" style="display:none">Nenhum processo encontrado.</div>
    </div>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('analista_token') || '';
let _dados = [];
let _jobId = null;
let _pollTimer = null;
let _carregando = false;

// ── UTILS DE DATA ─────────────────────────────────────────────
// Normaliza qualquer formato de data recebido (dd/MM/yyyy, ISO, verbose JS Date)
// para dd/MM/AAAA HH:mm — ou só dd/MM/AAAA quando não há hora.
function _fmtData(s, somenteData = false) {
  if (!s || s === '—') return '—';
  // Já está no formato correto (dd/MM/yyyy...)
  if (/^\d{2}\/\d{2}\/\d{4}/.test(s)) {
    return somenteData ? s.split(' ')[0] : s;
  }
  // Tenta converter qualquer outro formato (ISO, verbose JS Date string)
  try {
    const d = new Date(s);
    if (isNaN(d.getTime())) return s || '—';
    if (somenteData) return d.toLocaleDateString('pt-BR');
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) { return s || '—'; }
}

// ── AUTH ─────────────────────────────────────────────────────
async function fazerLogin() {
  const u = document.getElementById('usuario').value.trim();
  const s = document.getElementById('senha').value.trim();
  if (!u || !s) return;
  try {
    const r = await fetch(API + '/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({usuario: u, senha: s})
    });
    const j = await r.json();
    if (j.token) {
      token = j.token;
      localStorage.setItem('analista_token', token);
      mostrarConteudo();
    } else {
      document.getElementById('loginErr').textContent = j.error || 'Credenciais inválidas.';
    }
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Erro de conexão.';
  }
}
document.getElementById('senha').addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });

function _headers() {
  return {'Content-Type':'application/json', 'Authorization': 'Bearer ' + token};
}

// ── INIT ─────────────────────────────────────────────────────
async function mostrarConteudo() {
  document.getElementById('loginWrap').style.display  = 'none';
  document.getElementById('conteudo').style.display   = 'block';
  await carregarAdvogados();
}

async function carregarAdvogados() {
  try {
    const r = await fetch(API + '/usuarios', {headers: _headers()});
    const j = await r.json();
    const sel = document.getElementById('selAdv');
    sel.innerHTML = '';
    (j.usuarios || j || []).forEach(u => {
      const opt = document.createElement('option');
      opt.value = (u.label || u.cpf).toLowerCase().replace(/ /g,'_');
      opt.textContent = u.nome || u.label || u.cpf;
      sel.appendChild(opt);
    });
    if (sel.options.length) await carregarDados();
  } catch(e) { console.error(e); }
}

function trocarAdvogado() { carregarDados(); }

async function carregarDados() {
  const adv = document.getElementById('selAdv').value;
  if (!adv) return;
  try {
    const r = await fetch(`${API}/distribuicoes?adv=${encodeURIComponent(adv)}`, {headers: _headers()});
    const j = await r.json();
    if (j.ok) {
      _dados = j.data || [];
      _carregando = false;
      if (j.updatedAt) document.getElementById('lastUpdate').textContent =
        'Atualizado: ' + new Date(j.updatedAt).toLocaleString('pt-BR');
      popularFiltroTurma();
      renderStats();
      aplicarFiltros();
    }
  } catch(e) { console.error(e); }
}

// ── FILTROS ──────────────────────────────────────────────────
function popularFiltroTurma() {
  const turmas = [...new Set(_dados.map(d => d['TURMA/CÂMARA'] || '').filter(Boolean))].sort();
  const sel = document.getElementById('filtroTurma');
  const atual = sel.value;
  sel.innerHTML = '<option value="">Todas as Turmas/Câmaras</option>';
  turmas.forEach(t => {
    const o = document.createElement('option');
    o.value = t; o.textContent = t;
    if (t === atual) o.selected = true;
    sel.appendChild(o);
  });
}

function aplicarFiltros() {
  const turma  = document.getElementById('filtroTurma').value.toLowerCase();
  const status = document.getElementById('filtroStatus').value;
  const busca  = document.getElementById('filtroBusca').value.toLowerCase();
  const filtrado = _dados.filter(d => {
    if (turma  && !(d['TURMA/CÂMARA'] || '').toLowerCase().includes(turma)) return false;
    if (status && (d['STATUS DO JULGAMENTO'] || '') !== status)              return false;
    if (busca) {
      const txt = [d['NÚMERO DO PROCESSO'], d['RELATOR'], d['CLASSE']].join(' ').toLowerCase();
      if (!txt.includes(busca)) return false;
    }
    return true;
  });
  renderTabela(filtrado);   // stats NÃO são afetados pelo filtro
}

// ── RENDER ───────────────────────────────────────────────────
function _isNovo(captura) {
  if (!captura) return false;
  try {
    const norm = _fmtData(captura);       // normaliza para dd/MM/yyyy HH:mm
    const parts = norm.split(' ')[0].split('/');
    const d = new Date(+parts[2], +parts[1]-1, +parts[0]);
    return (Date.now() - d.getTime()) < 36*3600*1000;
  } catch(e) { return false; }
}

function _statusBadge(status) {
  const cls = status === 'Pautado' ? 'pautado' : status === 'Julgado' ? 'julgado' : 'pendente';
  return `<span class="status-badge status-${cls}">${status || 'Pendente'}</span>`;
}

// Stats sempre calculados a partir de _dados (globais, não filtrados)
function renderStats() {
  const stats    = document.getElementById('stats');
  const lbl      = _carregando ? '<span class="val loading">—</span>' : null;
  const total    = _dados.length;
  const pautados = _dados.filter(d => d['STATUS DO JULGAMENTO'] === 'Pautado').length;
  const pendentes= _dados.filter(d => !d['STATUS DO JULGAMENTO'] || d['STATUS DO JULGAMENTO'] === 'Pendente').length;
  const novos    = _dados.filter(d => _isNovo(d['DATA DE CAPTURA'])).length;

  const val = (v, extra='') => _carregando
    ? `<div class="val loading">—</div>`
    : `<div class="val${extra ? ' style="'+extra+'"' : ''}">${v}</div>`;

  stats.innerHTML = `
    <div class="stat-card">${val(total)}<div class="lbl">Processos ativos</div></div>
    <div class="stat-card pendente">${val(pendentes)}<div class="lbl">Pendentes</div></div>
    <div class="stat-card pautado">${val(pautados)}<div class="lbl">Pautados</div></div>
    <div class="stat-card">${_carregando ? '<div class="val loading">—</div>' : '<div class="val" style="color:#56d364">'+novos+'</div>'}<div class="lbl">Novos (24h)</div></div>
  `;
}

function renderTabela(dados) {
  const tbody   = document.getElementById('tabela');
  const emptyEl = document.getElementById('empty');

  if (!dados.length) {
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  tbody.innerHTML = dados.map(d => `
    <tr>
      <td>
        <span class="proc-link" title="Clique para copiar" onclick="navigator.clipboard.writeText('${d['NÚMERO DO PROCESSO']}')">${d['NÚMERO DO PROCESSO']}</span>
        ${_isNovo(d['DATA DE CAPTURA']) ? '<span class="badge-novo">NOVO</span>' : ''}
      </td>
      <td style="white-space:nowrap">${_fmtData(d['DATA DE DISTRIBUIÇÃO'], true)}</td>
      <td><span class="turma-badge">${d['TURMA/CÂMARA'] || '—'}</span></td>
      <td>${d['RELATOR'] || '—'}</td>
      <td>${d['CLASSE'] || '—'}</td>
      <td>${_statusBadge(d['STATUS DO JULGAMENTO'])}</td>
      <td style="white-space:nowrap;color:#8b949e">${_fmtData(d['DATA DE CAPTURA'])}</td>
    </tr>
  `).join('');
}

// ── JOB POLLING ──────────────────────────────────────────────
async function iniciarAtualizacao() {
  const adv = document.getElementById('selAdv').value;
  let cpf = '';
  try {
    const r = await fetch(API + '/usuarios', {headers: _headers()});
    const j = await r.json();
    const lista = j.usuarios || j || [];
    const u = lista.find(x => (x.label||x.cpf).toLowerCase().replace(/ /g,'_') === adv);
    if (u) cpf = u.cpf;
  } catch(e) {}
  if (!cpf) { alert('Selecione um advogado válido.'); return; }

  _carregando = true;
  renderStats();
  document.getElementById('btnAtualizar').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';

  try {
    const fmtData = v => v ? v.split('-').reverse().join('/') : null;
    const data_ini = fmtData(document.getElementById('dataIni').value);
    const data_fim = fmtData(document.getElementById('dataFim').value);
    const r = await fetch(API + '/iniciar_distribuicoes', {
      method: 'POST',
      headers: _headers(),
      body: JSON.stringify({cpf, data_ini, data_fim})
    });
    const j = await r.json();
    if (j.ok) {
      _jobId = j.job_id;
      _pollTimer = setInterval(pollJob, 3000);
    } else {
      alert(j.error || 'Erro ao iniciar.');
      resetUI();
    }
  } catch(e) { alert('Erro de conexão.'); resetUI(); }
}

async function pollJob() {
  if (!_jobId) return;
  try {
    const r = await fetch(API + '/progresso/' + _jobId, {headers: _headers()});
    const j = await r.json();
    document.getElementById('progressFill').style.width = (j.pct || 0) + '%';
    document.getElementById('statusMsg').textContent = j.subtitulo || '';

    if (j.status === 'done') {
      clearInterval(_pollTimer);
      resetUI();
      await carregarDados();
    } else if (j.status === 'error') {
      clearInterval(_pollTimer);
      alert('Erro: ' + (j.error || 'Falha desconhecida'));
      resetUI();
    }
  } catch(e) {}
}

function resetUI() {
  document.getElementById('btnAtualizar').disabled = false;
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
}

// ── BOOT ─────────────────────────────────────────────────────
(async function() {
  if (!token) return;
  try {
    const r = await fetch(API + '/usuarios', {headers: _headers()});
    if (r.status === 401) { token = ''; localStorage.removeItem('analista_token'); return; }
    mostrarConteudo();
  } catch(e) {}
})();
</script>
</body>
</html>
